services:
  # ── Backend: Elixir/Phoenix API ──────────────────────────────────────────
  - type: web
    name: canopy-backend
    runtime: elixir
    rootDir: backend
    buildCommand: mix deps.get --only prod && mix compile
    startCommand: mix ecto.migrate && mix phx.server
    healthCheckPath: /api/v1/health
    envVars:
      - key: PHX_SERVER
        value: "true"
      - key: PORT
        value: "9089"
      - key: MIX_ENV
        value: prod
      - key: PHX_HOST
        fromService:
          name: canopy-backend
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: canopy-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: GUARDIAN_SECRET_KEY
        generateValue: true
      - key: POOL_SIZE
        value: "5"

  # ── Frontend: SvelteKit Command Center (Static Site) ─────────────────────
  # NOTA: Después del primer deploy, actualiza VITE_API_URL en el dashboard
  # de Render con la URL real del backend: https://canopy-backend.onrender.com
  - type: web
    name: canopy-desktop
    runtime: static
    rootDir: desktop
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://canopy-backend-0r6g.onrender.com

# ── Base de datos PostgreSQL ─────────────────────────────────────────────────
databases:
  - name: canopy-db
    databaseName: canopy_prod
    user: canopy
    plan: free
